name: Build & Push Kasm Noble Desktop Custom

on:
  push:
    branches: [ "main" ]
  schedule:
    # Weekly rebuild (Mon 03:30 UTC) to track rolling-weekly base updates
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kasm-noble-desktop-custom

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
	  file: ./Dockerfile
          push: true
          pull: true
          tags: |
            ${{ env.IMAGE_NAME }}:rolling
            ${{ env.IMAGE_NAME }}:1.18.0-rolling-daily
